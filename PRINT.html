<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Partmat</title>
    <link rel="stylesheet" href="partmat.css"> <!-- Usa tu CSS existente -->
    <style>
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #1e3c72, #2a5298); color: #fff; }
        h2 { margin-bottom: 20px; font-size: 28px; }
        #btnLoginGoogle { padding: 12px 25px; background-color: #00c6ff; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        #btnLoginGoogle:hover { background-color: #0072ff; }
    </style>
</head>
<body>

<h2>Inicia sesión con Google</h2>
<button id="btnLoginGoogle">Login con Google</button>

<script type="module">
import { auth, provider, signInWithPopup, onAuthStateChanged, db, doc, setDoc } from "./firebase.js";

// 🔹 REDIRECCIÓN AUTOMÁTICA SI YA ESTÁ LOGUEADO
onAuthStateChanged(auth, (user) => {
    if (user) {
        window.location.href = "partmat.html";
    }
});

// 🔹 LOGIN CON GOOGLE
document.getElementById("btnLoginGoogle").addEventListener("click", async () => {
    try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        // Guardar o actualizar usuario en Firestore
        const userRef = doc(db, "usuarios", user.uid);
        await setDoc(userRef, {
            nombre: user.displayName,
            email: user.email,
            vidas: 3,
            puntos: 0
        }, { merge: true });

        // Redirige al main
        window.location.href = "partmat.html";

    } catch (error) {
        console.error("Error login Google:", error);
        alert("Error al iniciar sesión: " + error.message);
    }
});
</script>
</body>
</html>
